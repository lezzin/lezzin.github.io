<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./js/bootstrap.min.js"></script>
    <link rel="icon" type="image/png" href="./earth.svg" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="./css/style.css">
    <title>Consulta CEP</title>
</head>

<body class="bg-dark">
    <div
        class="d-flex container rounded mt-4 bg-secondary text-white flex-column justify-content-center align-items-center">
        <form class="p-4 d-flex flex-column align-items-center">
            <h1 class="text-white p-1 text-center">API de CEPS</h1>

            <div class="row mt-2">
                <div class="form-group">
                    <input type="text" class="form-control text-center" id="cep" placeholder="CEP">
                    <small class="text-warning text-center">Sem pontos e traços</small>
                </div>
            </div>

            <div class=" row d-flex justify-content-center align-items-center">
                <div class="col-6">
                    <div class="form-group">
                        <label for="cidade">Cidade</label>
                        <input type="text" class="form-control text-center" id="cidade" placeholder="Cidade" disabled>
                    </div>
                </div>

                <div class="col-3">
                    <div class="form-group">
                        <label for="cep">Estado</label>
                        <input type="text" class="form-control text-center" id="estado" disabled>
                    </div>
                </div>
            </div>

            <div class="row d-flex justify-content-center align-items-center">
                <div class="col-6">
                    <div class=" form-group">
                        <label for="logradouro">Logradouro/bairro</label>
                        <input type="text" class="form-control text-center" id="logradouro">
                    </div>
                </div>
                <div class="col-3">
                    <div class="form-group">
                        <label for="ddd">DDD</label>
                        <input type="text" class="form-control text-center" id="ddd" disabled>
                    </div>
                </div>
            </div>

        </form>
    </div>

    <div
        class="container rounded mt-4 mb-4 bg-secondary text-white d-flex flex-column justify-content-center align-items-center">
        <div class="m-4">
            <h1 class="text-white text-center">Gerador de frases</h1>
            <div class="p-3 d-flex flex-column justify-content-center align-items-center text-center" id="lista">
            </div>
            <div class="row d-flex justify-content-center align-items-center">
                <button class=" btn btn-light m-1" id="btn-msg">Gerar frase</button>
                <button class="btn btn-light m-1" id="btn-deletar-msg">Apagar frases</button>
            </div>
        </div>
    </div>
</body>

<script src="./js/pesquisarCEP.js"></script>
<script src="./js/geradorFrase.js"></script>

</html>
